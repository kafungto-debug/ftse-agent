name: FTSE AI Agent

on:
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 12 * * *"
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run FTSE AI Agent
        run: |
          python main.py

      - name: Commit previous picks
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add previous_picks.json

          git diff --staged --quiet || git commit -m "Update previous picks"

          git push
